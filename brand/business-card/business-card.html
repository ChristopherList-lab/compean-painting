:root {
  --red:#D62828; --deep:#A61B1B; --ink:#141414; --charcoal:#1D1D1F;
  --silver:#8E8E8E; --canvas:#F5F3EF;
}
* { margin:0; padding:0; box-sizing:border-box; }
html,body { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
@page { size:3.625in 2.125in; margin:0; }
.card {
  width:3.625in; height:2.125in; position:relative; overflow:hidden;
  page-break-after:always;
}
/* ---------- FRONT ---------- */
.front { background:var(--ink); color:#fff;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding-bottom:0.30in; }
.front .mark { width:0.62in; height:0.62in; }
.front h1 { font-family:'Archivo Black'; font-weight:400; font-size:0.265in;
  letter-spacing:0.022in; text-indent:0.022in; margin-top:0.10in; }
.front .sub { font-family:'Barlow Condensed'; font-weight:600; font-size:0.118in;
  letter-spacing:0.052in; text-indent:0.052in; color:var(--red); margin-top:0.045in; }
.front .est { position:absolute; bottom:0.24in; left:0; right:0; text-align:center;
  font-family:'Barlow Condensed'; font-weight:500; font-size:0.078in;
  letter-spacing:0.024in; text-indent:0.024in; color:var(--silver); }
.front .bar { position:absolute; bottom:0; left:0; right:0; height:0.12in; background:var(--red); }
/* ---------- BACK ---------- */
.back { background:var(--canvas); color:var(--ink);
  display:flex; align-items:center; gap:0.24in;
  padding:0.30in 0.30in 0.24in 0.32in; }
.back .bar { position:absolute; top:0; left:0; right:0; height:0.12in; background:var(--red); }
.back .info { flex:1; min-width:0; }
.back h2 { font-family:'Archivo Black'; font-weight:400; font-size:0.165in; letter-spacing:0.004in; }
.back .role { font-family:'Barlow Condensed'; font-weight:600; font-size:0.095in;
  letter-spacing:0.028in; color:var(--red); margin-top:0.028in; text-transform:uppercase; }
.back .phone { font-family:'Barlow Condensed'; font-weight:700; font-size:0.245in;
  letter-spacing:0.006in; margin-top:0.10in; color:var(--ink); }
.back .cta { font-family:'Barlow'; font-weight:500; font-size:0.084in;
  color:var(--charcoal); margin-top:0.018in; }
.back .services { font-family:'Barlow'; font-weight:500; font-size:0.086in;
  line-height:1.45; color:var(--charcoal); margin-top:0.095in;
  border-top:1.5px solid #DDD8CF; padding-top:0.08in; }
.back .fb { font-family:'Barlow Condensed'; font-weight:500; font-size:0.08in;
  letter-spacing:0.012in; color:var(--silver); margin-top:0.05in; }
.back .bbb { flex-shrink:0; text-align:center; }
.back .bbb .rated { font-family:'Barlow Condensed'; font-weight:700; font-size:0.088in;
  letter-spacing:0.022in; color:var(--red); margin-bottom:0.04in; }
.back .bbb .qrbox { background:#fff; border:1.5px solid #E3DED5; border-radius:0.05in;
  padding:0.045in; display:inline-block; }
.back .bbb img { width:0.68in; height:0.68in; display:block; }
.back .bbb .scan { font-family:'Barlow Condensed'; font-weight:500; font-size:0.072in;
